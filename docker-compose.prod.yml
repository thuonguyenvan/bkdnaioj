version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL: "168h"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "${S3_PUBLIC_ENDPOINT:-https://${STORAGE_DOMAIN}}"
      S3_BUCKET: "submissions"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      LOG_LEVEL: "info"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM:-${SMTP_USER}}"
      APP_BASE_URL: "https://www.bkdnaioj.app"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis: { condition: service_healthy }

  worker-judge:
    build:
      context: ./backend/workers
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      WORKER_ROLE: "judge"
      WORKER_GROUP: "cg:judge-worker"
      WORKER_CONSUMER: "worker-judge-1"
      STREAM_JUDGE: "jobs:judge"
      STREAM_RESULTS: "jobs:results"
      SANDBOX_TIMEOUT_S: "1200" # 20 phút
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "submissions"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_SECURE: "false"
    deploy:
      resources:
        limits:
          cpus: '0.60' # Giới hạn CPU tránh nghẽn API
          memory: 800M # Tránh phình RAM
    depends_on:
      redis: { condition: service_healthy }

volumes:
  redis_data:
  miniodata:
