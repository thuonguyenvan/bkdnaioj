services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: olpai
      POSTGRES_PASSWORD: olpai
      POSTGRES_DB: olpai
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olpai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  api:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://olpai:olpai@db:5432/olpai?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-secret-change-me-to-a-32-char-minimum"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      S3_BUCKET: "submissions"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      LOG_LEVEL: "info"
    ports: ["8080:8080"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }

  worker-judge:
    build: ./workers
    environment:
      DATABASE_URL: "postgres://olpai:olpai@db:5432/olpai?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      WORKER_ROLE: "judge"
      WORKER_GROUP: "cg:judge-worker"
      STREAM_JUDGE: "jobs:judge"
      STREAM_RESULTS: "jobs:results"
      SANDBOX_TIMEOUT_S: "300"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: "submissions"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_SECURE: "false"
      SHARED_TEMP_VOLUME_NAME: "olpai_shared_temp"
    volumes:
      - shared-temp:/app/shared-temp
      # docker.sock unmounted → runner falls back to subprocess mode (worker env has PIL/numpy)
      # Mount again for production Docker-in-Docker isolation
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  pgdata: {}
  miniodata: {}
  shared-temp:
    name: olpai_shared_temp
