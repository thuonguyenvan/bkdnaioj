[project]
name = "olpai-volunteer-agent"
version = "0.1.0"
description = "Volunteer judge worker agent for OLPAI"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "psutil>=5.9",
    "structlog>=24.0,<26",
]

[project.optional-dependencies]
gpu = ["pynvml>=11.0"]
docker = ["docker>=7.0"]

[project.scripts]
olpai-volunteer = "app.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"
